# TalentIntel 扩展关键词搜索配置 V2.0
# 基于用户推荐候选人特征优化 (2026-03-24)
# 核心方向: 无线通信 + AI 交叉、AI-RAN、MIMO、L1/PHY层

search_keywords:
  # ===== 核心匹配方向 (新增) =====
  # AI-RAN / O-RAN (最高优先级)
  - "AI-RAN"
  - "O-RAN AI"
  - "AI RAN engineer"
  - "intelligent RAN"
  - "AI-RAN algorithm"
  - "vRAN AI"
  - "Open RAN machine learning"
  
  # MIMO + AI (关键技能)
  - "MIMO channel estimation machine learning"
  - "MIMO deep learning"
  - "massive MIMO AI"
  - "MIMO precoding neural network"
  - "MIMO signal processing AI"
  
  # L1/PHY层 + AI (核心技术)
  - "5G PHY AI"
  - "4G LTE baseband machine learning"
  - "wireless modem L1 AI"
  - "PHY layer algorithm deep learning"
  - "baseband firmware AI"
  - "wireless signal processing neural network"
  
  # 嵌入式通信算法
  - "embedded communication algorithm"
  - "low complexity wireless algorithm"
  - "embedded AI wireless"
  - "communication system optimization"
  
  # ===== 原有基础组合 =====
  - "machine learning wireless"
  - "AI engineer 5G"
  - "wireless communication researcher"
  - "6G AI"
  
  # AI + 软件栈
  - "AI software stack"
  - "ML infrastructure engineer"
  - "AI platform engineer"
  - "deep learning framework"
  - "AI compiler optimization"
  - "neural network deployment"
  
  # 模型压缩 + 边缘AI
