# 经验年限筛选 (新增)
experience_filters:
  senior: 10      # 10年以上经验
  mid: 5          # 5-10年经验
  junior: 2       # 2-5年经验

# 搜索配置
search_config:
  pages_per_keyword: 5        # 每个关键词搜索5页
  profiles_per_batch: 20      # 每批评估20个档案
  min_match_score: 0.70       # 最低匹配分数
  daily_limit: 50             # 每日最多搜索50个档案
  
  # 新增：优先级加权
  priority_weights:
    has_ai_ran: 1.5           # AI-RAN经验加权50%
    has_mimo_ml: 1.4          # MIMO+ML经验加权40%
    has_phy_ai: 1.3           # PHY层AI经验加权30%
    multi_company: 1.2        # 多公司背景加权20%
    academic_to_industry: 1.15 # 学术转工业界加权15%

# 代理轮换配置
proxy_rotation:
  enabled: true
  switch_after_requests: 10   # 每10个请求切换代理
  health_check_interval: 300  # 5分钟健康检查

# 反爬虫策略
anti_detection:
  delay_between_requests: [3, 8]  # 3-8秒随机延迟
  user_agents_rotation: true
  cookie_persistence: true

# 新增：人才画像标签
talent_profiles:
  ai_ran_specialist:
    keywords: ["AI-RAN", "O-RAN", "vRAN", "intelligent RAN"]
    min_score: 0.85
  
  mimo_ml_expert:
    keywords: ["MIMO", "channel estimation", "precoding", "massive MIMO"]
    min_score: 0.80
  
  phy_layer_ai:
    keywords: ["PHY", "baseband", "L1", "modem", "wireless signal processing"]
    min_score: 0.80
  
  wireless_veteran:
    keywords: ["5G", "4G", "LTE", "3GPP", "wireless communication"]
    min_years: 15
    min_score: 0.75
  
  executive_talent:
    keywords: ["VP", "Director", "Principal", "Senior Director"]
    min_score: 0.90
