# === 代理来源推荐 ===
# 
# 付费代理（高质量）:
# - Bright Data: https://brightdata.com/ (住宅代理，最稳定)
# - Oxylabs: https://oxylabs.io/ (数据中心+住宅)
# - Smartproxy: https://smartproxy.com/ (性价比高)
# - IPRoyal: https://iproyal.com/ (轮换代理)
#
# 免费代理（不稳定，仅供测试）:
# - https://www.proxy-list.download/
# - https://free-proxy-list.net/
# - https://proxyscrape.com/
#
# === 配置建议 ===
#
# 大规模搜索推荐:
# - 住宅代理: 10-20个
# - 轮换间隔: 每请求切换
# - 健康检查: 每30分钟
#
# 小规模测试:
# - 数据中心代理: 5-10个
# - 失败阈值: 2次
# - 恢复时间: 30分钟
