# 目标人才定义
# 研究员将根据这些标准筛选和评估人才

targets:
  # 人才画像 1: AI + Wireless 交叉领域研究者
  - name: "AI-Wireless Researchers"
    priority: high
    criteria:
      keywords:
        - "AI wireless communication"
        - "deep learning physical layer"
        - "neural network 5G"
        - "MIMO machine learning"
        - "intelligent reflecting surface"
        - "federated learning wireless"
      locations:
        - "United States"
        - "Canada"
        - "United Kingdom"
        - "Singapore"
        - "Hong Kong"
      education:
        - "PhD"
        - "PostDoc"
        - "Master"
    sources:
      - linkedin

# 搜索策略
search_strategy:
  daily_batch_size: 3        # 每日处理数量（保守起见先设为3）
  max_depth: 2               # 关联人才挖掘深度
  min_match_score: 0.5       # 最低匹配分数（规则评估可以适当降低）
